<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 114">
  <!-- Ticket mark — dark variant (Ink on Newsprint) -->
  <!-- For use on light backgrounds at 48px+ -->
  <!-- Crossbar -->
  <rect x="0" y="0" width="72" height="14" rx="1.5" fill="#1C1917"/>
  <!-- Stem -->
  <rect x="18" y="14" width="36" height="100" fill="#1C1917"/>
  <!-- Single perforation at junction -->
  <circle cx="18" cy="16" r="3.5" fill="#F5F3EF"/>
  <circle cx="54" cy="16" r="3.5" fill="#F5F3EF"/>
  <line x1="21.5" y1="16" x2="50.5" y2="16" stroke="#F5F3EF" stroke-width="1.2" stroke-dasharray="2.5,2"/>
</svg>
